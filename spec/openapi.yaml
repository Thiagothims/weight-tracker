openapi: 3.0.3

info:
  title: Weight Tracker API
  description: >
    API para registro e acompanhamento de peso diário.
    Autenticação via JWT (Bearer Token).
    Endpoints públicos: /auth/register, /auth/login, /auth/forgot-password, /auth/reset-password.
    Todos os demais endpoints requerem autenticação via Bearer Token.
  version: 1.1.0
  contact:
    name: Weight Tracker

servers:
  - url: http://localhost:8080
    description: Desenvolvimento local

security:
  - bearerAuth: []

# =============================================================================
# COMPONENTS
# =============================================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token JWT obtido no login. Expira em 1 hora.

  schemas:

    # -------------------------------------------------------------------------
    # AUTH
    # -------------------------------------------------------------------------
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: João Silva
        email:
          type: string
          format: email
          example: joao@email.com
        password:
          type: string
          minLength: 8
          maxLength: 64
          example: senha@123

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: joao@email.com
        password:
          type: string
          example: senha@123

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT de acesso. Enviar no header Authorization Bearer.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: Token para renovar o accessToken sem novo login. Expira em 7 dias.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: Segundos até o accessToken expirar.
          example: 3600

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: joao@email.com

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          description: Token recebido por e-mail. Válido por 30 minutos. Uso único.
          example: a3f9b2c1d4e5f6a7b8c9...
        newPassword:
          type: string
          minLength: 8
          maxLength: 64
          example: NovaSenha@123

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          example: SenhaAtual@123
        newPassword:
          type: string
          minLength: 8
          maxLength: 64
          example: NovaSenha@123

    ChangeEmailRequest:
      type: object
      required: [newEmail, password]
      properties:
        newEmail:
          type: string
          format: email
          description: Novo e-mail. Não pode ser igual ao e-mail atual.
          example: novo@email.com
        password:
          type: string
          description: Senha atual para confirmar a identidade do usuário.
          example: SenhaAtual@123

    # -------------------------------------------------------------------------
    # PROFILE
    # -------------------------------------------------------------------------
    UserProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        name:
          type: string
          example: João Silva
        email:
          type: string
          format: email
          example: joao@email.com
        heightCm:
          type: number
          format: double
          description: Altura em centímetros. Utilizada para cálculo do IMC.
          example: 175.0
          minimum: 50
          maximum: 300
        createdAt:
          type: string
          format: date-time
          readOnly: true

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: João Silva
        heightCm:
          type: number
          format: double
          description: Altura em centímetros.
          example: 175.0
          minimum: 50
          maximum: 300

    # -------------------------------------------------------------------------
    # WEIGHT RECORDS
    # -------------------------------------------------------------------------
    WeightRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 42
        recordDate:
          type: string
          format: date
          description: Data do registro. Apenas um registro por data por usuário.
          example: "2026-04-12"
        recordTime:
          type: string
          description: Horário da aferição no formato HH:mm.
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "07:30"
        weightKg:
          type: number
          format: double
          description: Peso em quilogramas com até 2 casas decimais.
          example: 70.50
        bmi:
          type: number
          format: double
          description: >
            IMC calculado automaticamente pelo servidor.
            Fórmula: peso(kg) / (altura(m))².
            Requer altura cadastrada no perfil.
          example: 23.02
          readOnly: true
        bmiCategory:
          type: string
          description: Classificação do IMC conforme OMS.
          enum:
            - ABAIXO_DO_PESO
            - PESO_NORMAL
            - SOBREPESO
            - OBESIDADE_GRAU_1
            - OBESIDADE_GRAU_2
            - OBESIDADE_GRAU_3
          readOnly: true
          example: PESO_NORMAL
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    CreateWeightRecordRequest:
      type: object
      required: [recordTime, weightKg]
      description: >
        A data do registro é preenchida automaticamente pelo servidor com a data atual.
        O usuário informa apenas o horário e o peso.
      properties:
        recordTime:
          type: string
          description: Horário da aferição no formato HH:mm.
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "07:30"
        weightKg:
          type: number
          format: double
          minimum: 1.0
          maximum: 500.0
          example: 70.50

    UpdateWeightRecordRequest:
      type: object
      properties:
        recordTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "08:00"
        weightKg:
          type: number
          format: double
          minimum: 1.0
          maximum: 500.0
          example: 70.20

    # -------------------------------------------------------------------------
    # DASHBOARD / SUMMARY
    # -------------------------------------------------------------------------
    WeightTrendPoint:
      type: object
      description: Ponto de dado para o gráfico de linha de tendência.
      properties:
        date:
          type: string
          format: date
          example: "2026-04-01"
        weightKg:
          type: number
          format: double
          example: 70.50
        bmi:
          type: number
          format: double
          example: 23.02

    MonthSummary:
      type: object
      description: Resumo mensal utilizado para alimentar o dashboard.
      properties:
        year:
          type: integer
          example: 2026
        month:
          type: integer
          minimum: 1
          maximum: 12
          example: 4
        firstRecord:
          description: Primeiro registro do mês (menor data).
          allOf:
            - $ref: '#/components/schemas/WeightRecord'
          nullable: true
        lastRecord:
          description: Último registro aferido no mês (maior data).
          allOf:
            - $ref: '#/components/schemas/WeightRecord'
          nullable: true
        averageWeightKg:
          type: number
          format: double
          description: Média dos pesos registrados no mês.
          example: 70.30
          nullable: true
        minWeightKg:
          type: number
          format: double
          description: Menor peso registrado no mês.
          example: 69.80
          nullable: true
        maxWeightKg:
          type: number
          format: double
          description: Maior peso registrado no mês.
          example: 71.00
          nullable: true
        totalRecords:
          type: integer
          description: Quantidade de registros no mês.
          example: 12
        trendData:
          type: array
          description: Série temporal ordenada por data para o gráfico de linha.
          items:
            $ref: '#/components/schemas/WeightTrendPoint'

    # -------------------------------------------------------------------------
    # ERRORS
    # -------------------------------------------------------------------------
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Já existe um registro para a data informada.
        timestamp:
          type: string
          format: date-time

    ValidationErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 422
        error:
          type: string
          example: Unprocessable Entity
        message:
          type: string
          example: Erro de validação nos campos enviados.
        fields:
          type: object
          description: Mapa campo → mensagem de erro.
          additionalProperties:
            type: string
          example:
            weightKg: "Deve ser um número entre 1 e 500."
            recordDate: "Campo obrigatório."
        timestamp:
          type: string
          format: date-time

# =============================================================================
# PATHS
# =============================================================================
paths:

  # ---------------------------------------------------------------------------
  # AUTHENTICATION
  # ---------------------------------------------------------------------------
  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Registrar novo usuário
      description: Cria uma conta e retorna os tokens de acesso.
      security: []
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuário criado e autenticado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: E-mail já cadastrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Autenticar usuário
      description: Valida as credenciais e retorna os tokens de acesso.
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: E-mail ou senha inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/refresh:
    post:
      tags: [Authentication]
      summary: Renovar access token
      description: >
        Gera um novo accessToken usando o refreshToken.
        Não exige Bearer no header.
      security: []
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token renovado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Refresh token inválido ou expirado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      tags: [Authentication]
      summary: Encerrar sessão
      description: Invalida o refreshToken do dispositivo atual no servidor.
      operationId: logout
      responses:
        '204':
          description: Logout realizado com sucesso.
        '401':
          description: Não autenticado.

  /api/auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Solicitar redefinição de senha
      description: >
        Envia um e-mail com link de redefinição de senha.
        O link é válido por 30 minutos e de uso único.
        Por segurança, retorna 204 mesmo que o e-mail não exista.
      security: []
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '204':
          description: Solicitação processada. E-mail enviado se o endereço estiver cadastrado.
        '422':
          description: Formato de e-mail inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/auth/reset-password:
    post:
      tags: [Authentication]
      summary: Redefinir senha com token
      description: >
        Define uma nova senha usando o token recebido por e-mail.
        Após a redefinição: token é invalidado e todas as sessões ativas são encerradas.
      security: []
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Senha redefinida com sucesso. Todas as sessões foram encerradas.
        '400':
          description: Token inválido, expirado ou já utilizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/auth/change-password:
    put:
      tags: [Authentication]
      summary: Alterar senha (usuário autenticado)
      description: >
        Altera a senha do usuário logado.
        Exige a senha atual para confirmar a identidade.
        Após a alteração, todas as sessões em outros dispositivos são encerradas.
        A sessão atual permanece ativa.
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Senha alterada com sucesso.
        '400':
          description: Senha atual incorreta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado.
        '422':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/auth/change-email:
    put:
      tags: [Authentication]
      summary: Alterar e-mail (usuário autenticado)
      description: >
        Altera o e-mail do usuário logado.
        Exige a senha atual para confirmar a identidade.
        Após a alteração, todas as sessões em outros dispositivos são encerradas.
        A sessão atual permanece ativa.
        Não exige confirmação no novo e-mail (MVP).
      operationId: changeEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeEmailRequest'
      responses:
        '200':
          description: E-mail alterado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Senha incorreta ou novo e-mail igual ao atual.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado.
        '409':
          description: Novo e-mail já está em uso por outra conta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  # ---------------------------------------------------------------------------
  # PROFILE
  # ---------------------------------------------------------------------------
  /api/profile:
    get:
      tags: [Profile]
      summary: Obter perfil do usuário autenticado
      operationId: getProfile
      responses:
        '200':
          description: Perfil retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Não autenticado.

    put:
      tags: [Profile]
      summary: Atualizar perfil
      description: Atualiza nome e/ou altura. A altura é necessária para o cálculo do IMC.
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Perfil atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Não autenticado.
        '422':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  # ---------------------------------------------------------------------------
  # WEIGHT RECORDS
  # ---------------------------------------------------------------------------
  /api/weight-records:
    get:
      tags: [Weight Records]
      summary: Listar registros de peso por mês
      description: Retorna todos os registros do mês/ano informado, ordenados por data.
      operationId: listWeightRecords
      parameters:
        - name: year
          in: query
          required: true
          description: Ano do filtro.
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
            example: 2026
        - name: month
          in: query
          required: true
          description: Mês do filtro (1 a 12).
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 4
      responses:
        '200':
          description: Lista de registros do mês.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeightRecord'
        '401':
          description: Não autenticado.
        '422':
          description: Parâmetros inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

    post:
      tags: [Weight Records]
      summary: Criar registro de peso
      description: >
        Cria um novo registro para o dia informado.
        Apenas um registro por data por usuário é permitido.
      operationId: createWeightRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWeightRecordRequest'
      responses:
        '201':
          description: Registro criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeightRecord'
        '400':
          description: Já existe um registro para a data informada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado.
        '422':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/weight-records/{id}:
    put:
      tags: [Weight Records]
      summary: Atualizar registro de peso
      description: Permite editar o horário e/ou o peso de um registro existente.
      operationId: updateWeightRecord
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWeightRecordRequest'
      responses:
        '200':
          description: Registro atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeightRecord'
        '401':
          description: Não autenticado.
        '403':
          description: Sem permissão para editar este registro.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registro não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

    delete:
      tags: [Weight Records]
      summary: Excluir registro de peso
      operationId: deleteWeightRecord
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 42
      responses:
        '204':
          description: Registro excluído com sucesso.
        '401':
          description: Não autenticado.
        '403':
          description: Sem permissão para excluir este registro.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registro não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/weight-records/summary:
    get:
      tags: [Weight Records]
      summary: Resumo mensal para o dashboard
      description: >
        Retorna o primeiro registro, o último registro, médias,
        e a série temporal para o gráfico de linha.
      operationId: getMonthSummary
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
            example: 2026
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 4
      responses:
        '200':
          description: Resumo mensal retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthSummary'
        '401':
          description: Não autenticado.
        '422':
          description: Parâmetros inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
